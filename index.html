<!DOCTYPE html>

<head>

<style>
/* ... (TODO O SEU CSS ORIGINAL MANTIDO) ... */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;-webkit-tap-highlight-color:transparent;user-select:none}
body{ min-height:100vh; display:flex; justify-content:center; align-items:center; background:#000; color:#fff; position:relative; overflow:hidden; }
#matrix{ position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
#keyLock{ position:fixed;inset:0; background:rgba(0,0,0,0.95); display:flex;align-items:center;justify-content:center; z-index:9999; overflow:hidden; }
#matrixLogin{ position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; }
#keyCard{ position:relative; background:rgba(10,0,0,.95); padding:28px;border-radius:24px; width:320px;text-align:center; box-shadow:0 0 45px rgba(255,0,0,.7); z-index:2; border:2px solid #ff0000; }
#keyCard .brand{ letter-spacing:4px; color:#ff6a6a; margin-bottom:14px; font-size:18px; font-weight:700; }
#keyCard input{ width:100%; padding:12px; border-radius:999px; border:1px solid #ff0000; background:#120000; color:#fff; text-align:center; margin-bottom:12px; }
#keyCard button{ width:100%; padding:12px; border-radius:999px; border:none; background:linear-gradient(135deg,#ff0000,#cc0000); color:#fff; font-weight:700; box-shadow:0 0 22px #ff0000; cursor:pointer; transition:.3s; }
#keyMsg{margin-top:8px;font-size:12px;color:#ff7777}
.frame{ padding:6px; border-radius:26px; background:#ff0000; box-shadow:0 0 55px rgba(255,0,0,.9); position:relative; z-index:10; }
.app{ width:380px; height:420px; background:#0a0000; border-radius:22px; display:flex; overflow:hidden; }
.sidebar{ width:64px; background:#120000; display:flex; flex-direction:column; align-items:center; gap:14px; padding:14px 0; }
.icon{ width:44px; height:44px; border-radius:50%; background:#1a0000; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.3s; }
.icon svg{width:22px;height:22px;stroke:#666;fill:none}
.icon.active{box-shadow:0 0 18px #ff0000}
.icon.active svg{stroke:#ff0000}
.main{flex:1;padding:12px;overflow-y:auto}
.header{color:#ff0000;font-weight:700;margin-bottom:10px;text-shadow:0 0 10px #ff0000}
.item{ background:linear-gradient(180deg,#1a0000,#0f0000); border-radius:999px; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border:1px solid #330000; }
.toggle{ width:44px;height:22px; background:#333; border-radius:999px; position:relative; cursor:pointer; transition:.3s; }
.toggle::after{ content:''; width:16px;height:16px; background:#666; border-radius:50%; position:absolute; top:3px;left:4px; transition:.2s; }
.toggle.on{background:#ff0000;box-shadow:0 0 10px #ff0000}
.toggle.on::after{left:24px;background:#fff}
.btn{ width:100%; padding:12px; border:none; border-radius:999px; background:#ff0000; color:#fff; font-weight:700; margin-bottom:8px; box-shadow:0 0 18px #ff0000; cursor:pointer; transition:.3s; }
.log{ background:#050000; border-radius:12px; padding:8px; font-size:12px; color:#ff3333; height:90px; overflow:auto; font-family:monospace; border:1px solid #330000; }
.timer-box { background: rgba(255,0,0,0.1); border: 1px solid #ff0000; border-radius: 12px; padding: 10px; text-align: center; margin-bottom: 15px; }
#countdown { font-family: monospace; font-weight: 900; color: #ff0000; font-size: 16px; text-shadow: 0 0 5px #ff0000; }
.tab{display:none}
.tab.active{display:block}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="keyLock">
  <canvas id="matrixLogin"></canvas>
  <div id="keyCard">
    <div class="brand">PH-01</div>
    <input id="keyInput" placeholder="Digite sua key" autocomplete="off">
    <button onclick="ativarKey()">ENTRAR</button>
    <div id="keyMsg"></div>
  </div>
</div>

<div class="frame">
<div class="app">
<div class="sidebar">
  <div class="icon active" onclick="openTab('aim',this)"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="3"></circle></svg></div>
  <div class="icon" onclick="openTab('arma',this)"><svg viewBox="0 0 24 24"><path d="M3 12h18M9 8v8"></path></svg></div>
  <div class="icon" onclick="openTab('div',this)"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6"></rect><rect x="14" y="4" width="6" height="6"></rect><rect x="4" y="14" width="6" height="6"></rect><rect x="14" y="14" width="6" height="6"></rect></svg></div>
  <div class="icon" onclick="openTab('seg',this)"><svg viewBox="0 0 24 24"><path d="M12 3l8 4v6c0 5-8 8-8 8s-8-3-8-8V7z"></path></svg></div>
  <div class="icon" onclick="openTab('inj',this)"><svg viewBox="0 0 24 24"><path d="M4 20l16-16M14 4l6 6"></path></svg></div>

</div>

<div class="main">
<div id="aim" class="tab active">
  <div class="timer-box">
    <div style="font-size: 10px; color: #aaa;">TEMPO RESTANTE</div>
    <div id="countdown">CARREGANDO...</div>
  </div>
  <div class="header">AIMBOT</div>
  <div class="item"><span>Aimbot 89%</span><div class="toggle"></div></div>
  <div class="item"><span>Aumentar Precisão</span><div class="toggle"></div></div>
</div>
<div id="arma" class="tab">
  <div class="header">ARMA</div>
  <div class="item"><span>Sem Recuo</span><div class="toggle"></div></div>
  <div class="item"><span>Precisão Avançada</span><div class="toggle"></div></div>
</div>
<div id="div" class="tab">
  <div class="header">DIVERSOS</div>
  <div class="item"><span>ativar 120 FPS</span><div class="toggle"></div></div>
  <div class="item"><span>ativar OTIMIZAÇÃO</span><div class="toggle"></div></div>
</div>
<div id="seg" class="tab">

</div>
<div id="inj" class="tab">
  <div class="header">INJEÇÃO</div>
  <button class="btn" onclick="abrirFF('com.dts.freefireth')">ABRIR FREE FIRE</button>
  <button class="btn" onclick="abrirFF('com.dts.freefiremax')">ABRIR FREE FIRE MAX</button>
  <div class="log" id="log">Aguardando...</div>
</div>
<div id="info" class="tab">
  <div class="header">CRIADOR</div>
  <div style="text-align:center;padding:10px">
    <p>PH-01</p>
    <button class="btn" onclick="window.open('https://discord.gg/KCrcubaWhc')">DISCORD</button>
  </div>
</div>
</div>
</div>
</div>

<script>
// CONFIGURAÇÃO FIREBASE PH-01
const firebaseConfig = {
  apiKey: "AIzaSyDdBdGNijsYtiw_7vSMOu_n2Tt14Ur8rlc",
  authDomain: "ph01-f1031.firebaseapp.com",
  databaseURL: "https://ph01-f1031-default-rtdb.firebaseio.com",
  projectId: "ph01-f1031",
  storageBucket: "ph01-f1031.firebasestorage.app",
  messagingSenderId: "1041587184790",
  appId: "1:1041587184790:web:fd8786cad64023be220eb7"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let currentKey = "";
let timerInterval;

// MATRIX PH-01 (Código original mantido)
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
const canvasLogin = document.getElementById('matrixLogin');
const ctxLogin = canvasLogin.getContext('2d');
let w, h, columns, drops;
const chars = "PH-01".split("");

function initM() {
  w = canvas.width = canvasLogin.width = window.innerWidth;
  h = canvas.height = canvasLogin.height = window.innerHeight;
  columns = Math.floor(w / 20);
  drops = Array(columns).fill(1);
}

function drawM(c, tx) {
  tx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  tx.fillRect(0, 0, w, h);
  tx.fillStyle = '#f00';
  drops.forEach((y, i) => {
    const text = chars[Math.floor(Math.random() * chars.length)];
    tx.fillText(text, i * 20, y * 20);
    if (y * 20 > h && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
initM();
setInterval(() => { drawM(canvas, ctx); drawM(canvasLogin, ctxLogin); }, 35);

// VERIFICAÇÃO ONLINE
function ativarKey() {
  const input = document.getElementById('keyInput').value.trim().toUpperCase();
  const msg = document.getElementById('keyMsg');
  msg.innerText = "Verificando...";

  database.ref('PH_DB/' + input).once('value').then((snapshot) => {
    if (snapshot.exists()) {
      const expMs = snapshot.val();
      const agora = Date.now();
      
      if (agora > expMs) {
        msg.innerText = "❌ Key expirada!";
      } else {
        currentKey = input;
        document.getElementById('keyLock').style.display = 'none';
        startTimer(expMs);
      }
    } else {
      msg.innerText = "❌ Key inválida no sistema!";
    }
  });
}

function startTimer(expMs) {
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const agora = Date.now();
    const falta = expMs - agora;
    if (expMs > 2000000000000) {
       document.getElementById('countdown').innerText = "PERMANENTE";
       return;
    }
    if (falta <= 0) {
      clearInterval(timerInterval);
      alert("Sua Key expirou!");
      location.reload();
      return;
    }
    const d = Math.floor(falta / 86400000);
    const h = Math.floor((falta % 86400000) / 3600000);
    const m = Math.floor((falta % 3600000) / 60000);
    const s = Math.floor((falta % 60000) / 1000);
    document.getElementById('countdown').innerText = `${d}d ${h}h ${m}m ${s}s`;
  }, 1000);
}

function openTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.icon').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}
document.querySelectorAll('.toggle').forEach(t=>t.onclick=()=>t.classList.toggle('on'));

function abrirFF(pkg){
  const log = document.getElementById('log');
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  log.innerHTML += `<br>[${new Date().toLocaleTimeString()}] Abrindo ${pkg}...`;
  setTimeout(() => {
    if(isIOS) {
      window.location.href = pkg.includes('max') ? 'freefire-max://' : 'freefire://';
    } else {
      const scheme = pkg.includes('max') ? 'freefiremax' : 'freefire';
      window.location.href = `intent://#Intent;scheme=${scheme};package=${pkg};end`;
    }
  }, 500);
}
</script>
