<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PH-01 - GERADOR PH</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { width: 600px; border: 2px solid #00ff41; padding: 40px; border-radius: 20px; background: rgba(0,20,0,0.95); box-shadow: 0 0 40px #00ff41; text-align: center; position: relative; z-index: 10; }
        h1 { font-size: 28px; text-shadow: 0 0 10px #00ff41; border-bottom: 2px solid #00ff41; padding-bottom: 15px; margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #00ff41; color: #00ff41; font-weight: bold; font-size: 16px; box-sizing: border-box; }
        textarea { height: 120px; resize: none; font-size: 14px; }
        button { width: 100%; padding: 15px; background: #00ff41; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        .btn-aba { background: transparent; color: #00ff41; border: 1px solid #00ff41; margin-top: 15px; }
        .key-list-area { max-height: 300px; overflow-y: auto; text-align: left; margin-top: 20px; padding-right: 10px; }
        .key-item { background: rgba(0,255,65,0.05); padding: 15px; margin-bottom: 10px; border-left: 5px solid #00ff41; display: flex; justify-content: space-between; align-items: center; }
        .actions button { width: auto; padding: 5px 10px; font-size: 12px; margin-left: 5px; margin-top: 0; }
        .hidden { display: none; }
        label { display: block; text-align: left; font-size: 14px; margin-bottom: 8px; color: #fff; font-weight: bold; }
        #bg { position: fixed; top:0; left:0; z-index:1; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #00ff41; border-radius: 10px; }
    </style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="container" id="login-admin">
    <h1>TERMINAL PH-01</h1>
    <input type="password" id="pass" placeholder="SENHA MESTRA">
    <button onclick="logar()">INICIAR SISTEMA</button>
</div>

<div class="container hidden" id="aba-gerar">
    <h1>GERADOR PH</h1>
    <label>TEMPO DA KEY:</label>
    <select id="tempo">
        <option value="1">1 DIA</option>
        <option value="7">7 DIAS</option>
        <option value="30">30 DIAS</option>
        <option value="999">PERMANENTE</option>
    </select>
    <button onclick="gerarAuto()">GERAR AUTOMÁTICO</button>
    <input type="text" id="manual-key" placeholder="NOME DA KEY MANUAL">
    <button onclick="salvarManual()">SALVAR MANUAL</button>
    
    <button class="btn-aba" onclick="abrirAba('aba-organizar')">🧩 ORGANIZADOR EM MASSA (BULK)</button>
    <button class="btn-aba" onclick="abrirAba('aba-lista')">📦 VER BANCO DE KEYS</button>
</div>

<div class="container hidden" id="aba-organizar">
    <h1>ORGANIZADOR BULK</h1>
    <label>COLE AS KEYS (Uma por linha):</label>
    <textarea id="bulk-keys" placeholder="KEY-01&#10;KEY-02"></textarea>
    <label>TEMPO PARA ESSAS KEYS:</label>
    <select id="bulk-tempo">
        <option value="1">1 DIA</option>
        <option value="7">7 DIAS</option>
        <option value="30">30 DIAS</option>
        <option value="999">PERMANENTE</option>
    </select>
    <button onclick="organizarBulk()">SALVAR TUDO</button>
    <button class="btn-aba" onclick="abrirAba('aba-gerar')">⬅ VOLTAR</button>
</div>

<div class="container hidden" id="aba-lista">
    <h1>BANCO DE DADOS</h1>
    <div class="key-list-area" id="lista"></div>
    <button onclick="abrirAba('aba-gerar')">⬅ VOLTAR</button>
    <button onclick="limparBanco()" style="background:#400; color:red; margin-top: 15px; font-size: 10px;">APAGAR TUDO</button>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE PH-01
    const firebaseConfig = {
      apiKey: "AIzaSyDdBdGNijsYtiw_7vSMOu_n2Tt14Ur8rlc",
      authDomain: "ph01-f1031.firebaseapp.com",
      databaseURL: "https://ph01-f1031-default-rtdb.firebaseio.com",
      projectId: "ph01-f1031",
      storageBucket: "ph01-f1031.firebasestorage.app",
      messagingSenderId: "1041587184790",
      appId: "1:1041587184790:web:fd8786cad64023be220eb7"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const chars = "PH-01".split("");
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth, h = canvas.height = window.innerHeight;
    let drops = Array(Math.floor(w/20)).fill(1);

    setInterval(() => {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0,0,w,h);
        ctx.fillStyle = '#0f0';
        drops.forEach((y, i) => {
            ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*20, y*20);
            if(y*20 > h && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }, 35);

    function logar() {
        if(document.getElementById('pass').value === "GERADOR-PH01") abrirAba('aba-gerar');
        else alert("ERRO!");
    }

    function abrirAba(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(id === 'aba-lista') atualizarLista();
    }

    function calcularExp(dias) {
        return dias == 999 ? 9999999999999 : Date.now() + (dias * 24 * 60 * 60 * 1000);
    }

    function gerarAuto() {
        const key = "PH-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        const exp = calcularExp(parseInt(document.getElementById('tempo').value));
        database.ref('PH_DB/' + key).set(exp).then(() => alert("GERADA ONLINE: " + key));
    }

    function salvarManual() {
        const key = document.getElementById('manual-key').value.trim().toUpperCase();
        if(!key) return;
        const exp = calcularExp(parseInt(document.getElementById('tempo').value));
        database.ref('PH_DB/' + key).set(exp).then(() => {
            alert("SALVA NO BANCO: " + key);
            document.getElementById('manual-key').value = "";
        });
    }

    function organizarBulk() {
        const text = document.getElementById('bulk-keys').value.trim();
        if(!text) return alert("Cole as chaves!");
        const dias = parseInt(document.getElementById('bulk-tempo').value);
        const exp = calcularExp(dias);
        const linhas = text.split('\n');
        
        linhas.forEach(linha => {
            let k = linha.trim().toUpperCase();
            if(k) database.ref('PH_DB/' + k).set(exp);
        });
        
        document.getElementById('bulk-keys').value = "";
        alert("KEYS SINCRONIZADAS NO BANCO!");
        abrirAba('aba-lista');
    }

    function atualizarLista() {
        const lista = document.getElementById('lista');
        database.ref('PH_DB').on('value', (snapshot) => {
            lista.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const exp = data[k] > 2000000000000 ? "PERMANENTE" : new Date(data[k]).toLocaleString();
                    lista.innerHTML += `
                        <div class="key-item">
                            <div><b>${k}</b><br><small>${exp}</small></div>
                            <div class="actions">
                                <button style="background:blue; color:white;" onclick="editar('${k}')">E</button>
                                <button style="background:red; color:white;" onclick="remover('${k}')">X</button>
                            </div>
                        </div>`;
                });
            }
        });
    }

    function editar(k) {
        const novoD = prompt("Novo tempo em dias (ex: 30) para ["+k+"]:");
        if(novoD) {
            const exp = calcularExp(parseInt(novoD));
            database.ref('PH_DB/' + k).set(exp);
        }
    }

    function remover(k) {
        if(confirm("Deletar do banco: " + k + "?")) {
            database.ref('PH_DB/' + k).remove();
        }
    }

    function limparBanco() {
        if(confirm("APAGAR TODO O BANCO DE DADOS ONLINE?")) {
            database.ref('PH_DB').remove();
        }
    }
</script>
</body>
</html>
